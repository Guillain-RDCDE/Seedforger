name: Release

# Builds every platform artifact on a version tag and attaches them to the GitHub
# Release, with SHA-256 sums. Windows binaries are Authenticode-signed when a signing
# certificate secret is configured (see docs/packaging.md); otherwise they ship
# unsigned. Nothing here needs a paid runner.

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Windows GUI (lite, framework-dependent) + fat + CLI
        shell: bash
        run: |
          dotnet publish Seedforger/Seedforger.csproj -c Release -r win-x64 --self-contained false \
            -p:PublishSingleFile=true -o out/lite
          dotnet publish Seedforger/Seedforger.csproj -c Release -r win-x64 --self-contained true \
            -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -o out/fat
          dotnet publish Seedforger.Cli/Seedforger.Cli.csproj -c Release -r win-x64 --self-contained true \
            -p:PublishSingleFile=true -o out/cli
          dotnet publish Seedforger.App/Seedforger.App.csproj -c Release -r win-x64 --self-contained true \
            -p:PublishSingleFile=true -o out/gui-avalonia

      # Optional Authenticode signing — runs only if the cert secret is present, so
      # forks and unconfigured repos still build (just unsigned).
      - name: Sign Windows binaries
        if: ${{ env.CERT_B64 != '' }}
        env:
          CERT_B64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          CERT_PWD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: pwsh
        run: |
          $pfx = "$env:RUNNER_TEMP\cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:CERT_B64))
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Select-Object -Last 1).FullName
          Get-ChildItem out -Recurse -Include *.exe | ForEach-Object {
            & $signtool sign /f $pfx /p $env:CERT_PWD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $_.FullName
          }
          Remove-Item $pfx -Force

      - name: Stage named artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp out/lite/Seedforger.exe          dist/Seedforger-lite-win-x64.exe
          cp out/fat/Seedforger.exe           dist/Seedforger-win-x64.exe
          cp out/cli/Seedforger.Cli.exe       dist/Seedforger-cli-win-x64.exe
          cp out/gui-avalonia/Seedforger.App.exe dist/Seedforger-gui-win-x64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*

  unix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [linux-x64, linux-arm64, osx-x64, osx-arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish CLI + Avalonia GUI (${{ matrix.rid }})
        run: |
          dotnet publish Seedforger.Cli/Seedforger.Cli.csproj -c Release -r ${{ matrix.rid }} \
            --self-contained true -p:PublishSingleFile=true -o out/cli
          dotnet publish Seedforger.App/Seedforger.App.csproj -c Release -r ${{ matrix.rid }} \
            --self-contained true -p:PublishSingleFile=true -o out/gui

      - name: Stage named artifacts
        run: |
          mkdir -p dist
          cp out/cli/Seedforger.Cli dist/Seedforger-cli-${{ matrix.rid }}
          cp out/gui/Seedforger.App dist/Seedforger-gui-${{ matrix.rid }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: dist/*

  release:
    needs: [windows, unix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: staged
      - name: Collect + checksum
        run: |
          mkdir -p release
          find staged -type f -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS.txt
          ls -la
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release/*
          generate_release_notes: true
